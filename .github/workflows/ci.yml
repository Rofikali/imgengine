name: imgengine-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 🔥 FIXED (no Node 20 warning)

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3

      # 🔥 STRICT HEADER CHECK (ONLY ENGINE)
      - name: Check Headers (ENGINE ONLY)
        run: python3 scripts/check_headers.py

      - name: Build Engine
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Run Tests
        run: |
          if [ -f imgengine/tests/run_all.sh ]; then
            cd imgengine
            ./tests/run_all.sh
          else
            echo "No tests found"
          fi